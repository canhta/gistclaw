name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_REPO: canhta/homebrew-gistclaw
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: oven-sh/setup-bun@v2
      - name: Build embedded frontend assets
        run: |
          set -euo pipefail
          (cd frontend && bun install --frozen-lockfile)
          (cd frontend && bun run build)
      - name: Enforce embedded bundle budget
        run: |
          set -euo pipefail
          scripts/release-bundle-budget.sh internal/web/appdist
      - name: Build release archives
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA} -X main.buildDate=${BUILD_DATE}"
          mkdir -p dist/darwin-arm64 dist/linux-amd64
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "${LDFLAGS}" -o dist/darwin-arm64/gistclaw ./cmd/gistclaw
          tar -czf "dist/gistclaw_${VERSION}_darwin_arm64.tar.gz" -C dist/darwin-arm64 gistclaw
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "${LDFLAGS}" -o dist/linux-amd64/gistclaw ./cmd/gistclaw
          tar -czf "dist/gistclaw_${VERSION}_linux_amd64.tar.gz" -C dist/linux-amd64 gistclaw
      - name: Enforce release RSS budget
        run: |
          set -euo pipefail
          scripts/release-rss-smoke.sh dist/linux-amd64/gistclaw
      - name: Generate checksums
        run: |
          set -euo pipefail
          (cd dist && sha256sum gistclaw_*.tar.gz > SHA256SUMS.txt)
      - name: Render Homebrew formula
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          DARWIN_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/gistclaw_${VERSION}_darwin_arm64.tar.gz"
          DARWIN_SHA="$(sha256sum "dist/gistclaw_${VERSION}_darwin_arm64.tar.gz" | awk '{print $1}')"
          scripts/render-homebrew-formula.sh \
            --version "${VERSION}" \
            --url "${DARWIN_URL}" \
            --sha256 "${DARWIN_SHA}" \
            --output dist/gistclaw.rb
      - name: Binary smoke
        run: |
          set -euo pipefail
          tar -xzf "dist/gistclaw_${GITHUB_REF_NAME}_linux_amd64.tar.gz" -C /tmp
          /tmp/gistclaw version
      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          assets=(
            "dist/gistclaw_${VERSION}_darwin_arm64.tar.gz"
            "dist/gistclaw_${VERSION}_linux_amd64.tar.gz"
            "dist/SHA256SUMS.txt"
            "dist/gistclaw.rb#gistclaw.rb"
            "scripts/gistclaw-install.sh#gistclaw-install.sh"
          )
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" "${assets[@]}" --clobber
            exit 0
          fi
          gh release create "${VERSION}" \
            "${assets[@]}" \
            --title "${VERSION}" \
            --verify-tag \
            --generate-notes
      - name: Optionally update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          scripts/update-homebrew-tap.sh --formula dist/gistclaw.rb
