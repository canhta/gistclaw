{{define "layout"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    (() => {
      try {
        const savedTheme = window.localStorage.getItem("gistclaw.theme");
        if (savedTheme === "light" || savedTheme === "dark") {
          document.documentElement.dataset.theme = savedTheme;
        }
      } catch (_err) {
      }
    })();
  </script>
  <style>
    :root {
      --bg: #ede5d8;
      --surface: #fffdf8;
      --border-hard: #1c1917;
      --border-soft: #cfc5b6;
      --text-1: #1c1917;
      --text-2: #6b6258;
      --text-3: #9b9083;
      --brand: #1c5dff;
      --brand-hover: #1848c7;
      --pending: #1c5dff;
      --active: #0284c7;
      --approval: #b45309;
      --success: #15803d;
      --error: #dc2626;
      --muted-state: #6b7280;
      --font-mono: "JetBrains Mono", "Fira Code", monospace;
    }
    :root[data-theme="dark"] {
      --bg: #12100e;
      --surface: #1b1815;
      --border-hard: #f5f0e8;
      --border-soft: #4a433c;
      --text-1: #f5f0e8;
      --text-2: #b6aa9a;
      --text-3: #8f8477;
      --brand: #6ea0ff;
      --brand-hover: #8bb4ff;
      --pending: #6ea0ff;
      --active: #38bdf8;
      --approval: #f59e0b;
      --success: #4ade80;
      --error: #f87171;
      --muted-state: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --bg: #12100e;
        --surface: #1b1815;
        --border-hard: #f5f0e8;
        --border-soft: #4a433c;
        --text-1: #f5f0e8;
        --text-2: #b6aa9a;
        --text-3: #8f8477;
        --brand: #6ea0ff;
        --brand-hover: #8bb4ff;
        --pending: #6ea0ff;
        --active: #38bdf8;
        --approval: #f59e0b;
        --success: #4ade80;
        --error: #f87171;
        --muted-state: #9ca3af;
      }
    }
    * {
      box-sizing: border-box;
    }
    html {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--text-1);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    header {
      display: flex;
      align-items: center;
      min-height: 44px;
      border-bottom: 1.5px solid var(--border-hard);
      background: var(--bg);
      padding: 0 24px;
    }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      width: 100%;
    }
    .nav-spacer {
      flex: 1;
    }
    .nav-brand {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      background: var(--border-hard);
      color: var(--surface);
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
    }
    nav a {
      color: var(--text-2);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      text-underline-offset: 4px;
    }
    nav a:hover,
    nav a.is-active {
      color: var(--text-1);
      text-decoration: underline;
      text-decoration-thickness: 1.5px;
    }
    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }
    a {
      color: var(--brand);
    }
    a:hover {
      color: var(--brand-hover);
    }
    a:focus-visible,
    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 2px solid var(--brand);
      outline-offset: 2px;
    }
    h1,
    h2,
    h3,
    p,
    ul {
      margin-top: 0;
    }
    h1 {
      margin-bottom: 20px;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 700;
    }
    h2 {
      margin-bottom: 12px;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 700;
    }
    label {
      display: grid;
      gap: 4px;
      font-size: 13px;
      font-weight: 700;
    }
    code {
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .panel {
      border: 1.5px solid var(--border-hard);
      background: var(--surface);
      padding: 18px 20px;
      margin-bottom: 16px;
      border-radius: 0;
    }
    .page-header {
      display: grid;
      gap: 8px;
      margin: 0 0 20px 0;
    }
    .page-stack {
      display: grid;
      gap: 14px;
    }
    .page-section {
      margin-bottom: 20px;
    }
    fieldset {
      margin: 0;
      padding: 0;
      border: none;
      min-width: 0;
    }
    legend {
      padding: 0;
    }
    .page-eyebrow {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 3px 8px;
      background: var(--border-hard);
      color: var(--surface);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .page-lede {
      max-width: 720px;
      margin-bottom: 0;
      color: var(--text-2);
    }
    .panel:last-child {
      margin-bottom: 0;
    }
    .stack-sm > * + * {
      margin-top: 8px;
    }
    .stack-md > * + * {
      margin-top: 12px;
    }
    .stack-lg > * + * {
      margin-top: 16px;
    }
    .field {
      display: grid;
      gap: 4px;
      margin-bottom: 12px;
    }
    .field:last-child {
      margin-bottom: 0;
    }
    .field-help {
      font-size: 13px;
      color: var(--text-2);
    }
    .input-wide {
      width: 100%;
    }
    .mono {
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
    }
    .mono-strong {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.6;
    }
    .muted {
      color: var(--text-2);
    }
    .subtle {
      color: var(--text-3);
    }
    .run-row {
      border: 1.5px solid var(--border-hard);
      border-left: 4px solid var(--border-hard);
      padding: 14px 16px;
      margin-top: 0;
      background: var(--surface);
      border-radius: 0;
    }
    .run-row.is-active {
      border-left-color: var(--active);
    }
    .run-row.is-pending {
      border-left-color: var(--pending);
    }
    .run-row.is-approval {
      border-left-color: var(--approval);
    }
    .run-row.is-success {
      border-left-color: var(--success);
    }
    .run-row.is-error {
      border-left-color: var(--error);
    }
    .run-row.is-muted {
      border-left-color: var(--muted-state);
    }
    .run-link {
      display: block;
      color: inherit;
      text-decoration: none;
    }
    .run-link:hover {
      color: inherit;
    }
    .run-link:hover .row-title,
    .run-link:focus-visible .row-title {
      text-decoration: underline;
      text-decoration-thickness: 1.5px;
      text-underline-offset: 4px;
    }
    .row-title {
      font-size: 15px;
      font-weight: 700;
    }
    .run-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      border: 1.5px solid currentColor;
      padding: 2px 6px;
      background: var(--surface);
      color: var(--text-2);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .run-status::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex: none;
    }
    .run-status.is-active {
      color: var(--active);
    }
    .run-status.is-pending {
      color: var(--pending);
    }
    .run-status.is-approval {
      color: var(--approval);
    }
    .run-status.is-success {
      color: var(--success);
    }
    .run-status.is-error {
      color: var(--error);
    }
    .run-status.is-muted {
      color: var(--muted-state);
    }
    .run-output-text {
      margin: 8px 0 0 0;
      white-space: pre-wrap;
      word-break: break-word;
      font: 13px/1.6 var(--font-mono);
    }
    .error {
      border: 1.5px solid var(--error);
      color: var(--error);
      padding: 12px;
      margin-bottom: 16px;
      background: var(--surface);
      border-radius: 0;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid currentColor;
      padding: 2px 6px;
      background: transparent;
      color: currentColor;
      border-radius: 0;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .badge-approval {
      color: var(--approval);
    }
    .badge-success {
      color: var(--success);
    }
    .badge-error {
      color: var(--error);
    }
    .badge-muted {
      color: var(--text-2);
    }
    .grid-two {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
    }
    .desktop-table {
      display: block;
    }
    .directory-card-list {
      display: none;
      gap: 12px;
    }
    .directory-card {
      display: grid;
      gap: 12px;
      border: 1.5px solid var(--border-hard);
      border-left: 4px solid var(--border-hard);
      padding: 14px 16px;
      background: var(--surface);
    }
    .directory-card-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    }
    .directory-card-section {
      display: grid;
      gap: 3px;
    }
    .directory-card-label {
      color: var(--text-3);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .directory-card-actions {
      display: grid;
      gap: 8px;
    }
    .table th,
    .table td {
      border-top: 1px solid var(--border-soft);
      padding: 8px;
      vertical-align: top;
      text-align: left;
    }
    .table th {
      border-top: none;
      border-bottom: 1.5px solid var(--border-hard);
      font-size: 13px;
      font-weight: 700;
    }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .inline-form {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .inline-form input[type="text"],
    .inline-form input[type="password"],
    .inline-form select {
      min-width: 220px;
    }
    .filter-cluster {
      display: grid;
      gap: 4px;
      align-self: stretch;
    }
    .filter-legend {
      color: var(--text-2);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .segmented-control {
      display: inline-flex;
      align-items: stretch;
      border: 1.5px solid var(--border-hard);
      background: var(--surface);
    }
    .segmented-option {
      display: flex;
      gap: 0;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .segmented-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .segmented-option span {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-right: 1.5px solid var(--border-hard);
      background: var(--surface);
      color: var(--text-2);
    }
    .segmented-option:last-child span {
      border-right: none;
    }
    .segmented-option input:checked + span {
      background: var(--border-hard);
      color: var(--surface);
    }
    input[type="text"],
    input[type="password"],
    input[type="number"],
    textarea,
    select {
      border: 1.5px solid var(--border-hard);
      background: var(--surface);
      color: var(--text-1);
      padding: 8px 12px;
      font: inherit;
      border-radius: 0;
      width: 100%;
    }
    input[type="radio"],
    input[type="checkbox"] {
      width: auto;
      margin: 0;
      accent-color: var(--brand);
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1.5px solid transparent;
      padding: 7px 14px;
      background: transparent;
      color: var(--text-1);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
      text-decoration: none;
      cursor: pointer;
      border-radius: 0;
      transition: background 100ms ease-out, color 100ms ease-out, border-color 100ms ease-out;
    }
    button {
      font: inherit;
    }
    .btn-primary {
      background: var(--brand);
      border-color: var(--brand);
      color: var(--surface);
    }
    .btn-primary:hover {
      background: var(--brand-hover);
      border-color: var(--brand-hover);
      color: var(--surface);
    }
    .btn-secondary {
      background: var(--surface);
      border-color: var(--border-hard);
      color: var(--text-1);
    }
    .btn-secondary:hover {
      background: var(--border-hard);
      color: var(--surface);
    }
    .btn-ghost {
      border-color: transparent;
      padding-left: 0;
      padding-right: 0;
      color: var(--text-2);
    }
    .btn-ghost:hover {
      color: var(--text-1);
    }
    .btn-danger {
      background: var(--surface);
      border-color: var(--error);
      color: var(--error);
    }
    .btn-danger:hover {
      background: var(--error);
      color: var(--surface);
    }
    .btn-compact {
      padding: 4px 8px;
      font-size: 11px;
    }
    .choice-list {
      display: grid;
      gap: 8px;
    }
    .choice-card {
      display: grid;
      gap: 4px;
      border: 1.5px solid var(--border-hard);
      border-left: 4px solid var(--active);
      padding: 12px;
      cursor: pointer;
      background: var(--surface);
      border-radius: 0;
    }
    .choice-card-meta {
      display: block;
    }
    .theme-switcher {
      display: inline-flex;
      align-items: center;
      border: 1.5px solid var(--border-hard);
      background: var(--surface);
    }
    .theme-toggle {
      border: none;
      border-right: 1.5px solid var(--border-hard);
      padding: 7px 10px;
      background: var(--surface);
      color: var(--text-2);
      font: 700 11px/1.2 var(--font-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .theme-toggle:last-child {
      border-right: none;
    }
    .theme-toggle.is-active {
      background: var(--border-hard);
      color: var(--surface);
    }
    .divider {
      border: none;
      border-top: 1.5px solid var(--border-soft);
      margin: 16px 0;
    }
    .section-title {
      margin: 0 0 12px 0;
      font-size: 16px;
      font-weight: 700;
    }
    .pager {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 12px;
    }
    .status-banner {
      border: 1.5px solid var(--border-hard);
      border-left: 4px solid var(--border-hard);
      padding: 12px 14px;
      background: var(--surface);
    }
    .status-banner.is-pending {
      border-left-color: var(--pending);
    }
    .status-banner.is-active {
      border-left-color: var(--active);
    }
    .status-banner.is-approval {
      border-left-color: var(--approval);
    }
    .status-banner.is-success {
      border-left-color: var(--success);
    }
    .status-banner.is-error {
      border-left-color: var(--error);
    }
    .status-banner.is-muted {
      border-left-color: var(--muted-state);
    }
    .graph-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }
    .graph-stage {
      display: grid;
      gap: 16px;
    }
    .graph-diagram {
      height: clamp(360px, 48vh, 520px);
      border: 1.5px solid var(--border-hard);
      background: var(--surface);
    }
    .graph-metric {
      display: grid;
      gap: 2px;
      border: 1.5px solid var(--border-hard);
      border-left: 4px solid var(--border-hard);
      padding: 10px 12px;
      background: var(--surface);
    }
    .graph-metric.is-pending {
      border-left-color: var(--pending);
    }
    .graph-metric.is-active {
      border-left-color: var(--active);
    }
    .graph-metric.is-approval {
      border-left-color: var(--approval);
    }
    .graph-metric.is-success {
      border-left-color: var(--success);
    }
    .graph-metric.is-error {
      border-left-color: var(--error);
    }
    .graph-metric.is-muted {
      border-left-color: var(--muted-state);
    }
    .graph-metric-value {
      font: 700 20px/1.1 var(--font-mono);
      color: var(--text-1);
    }
    .graph-metric.is-pending .graph-metric-value {
      color: var(--pending);
    }
    .graph-metric.is-active .graph-metric-value {
      color: var(--active);
    }
    .graph-metric.is-approval .graph-metric-value {
      color: var(--approval);
    }
    .graph-metric.is-success .graph-metric-value {
      color: var(--success);
    }
    .graph-metric.is-error .graph-metric-value {
      color: var(--error);
    }
    .graph-metric.is-muted .graph-metric-value {
      color: var(--muted-state);
    }
    .graph-board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      align-items: start;
    }
    .graph-column {
      display: grid;
      gap: 10px;
    }
    .graph-column-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border-soft);
    }
    .graph-column-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .graph-node-stack {
      display: grid;
      gap: 10px;
    }
    .graph-node {
      display: grid;
      gap: 6px;
      border: 1.5px solid var(--border-hard);
      border-left: 4px solid var(--border-hard);
      padding: 12px;
      background: var(--surface);
    }
    .graph-node.is-pending {
      border-left-color: var(--pending);
    }
    .graph-node.is-active {
      border-left-color: var(--active);
    }
    .graph-node.is-approval {
      border-left-color: var(--approval);
    }
    .graph-node.is-success {
      border-left-color: var(--success);
    }
    .graph-node.is-error {
      border-left-color: var(--error);
    }
    .graph-node.is-muted {
      border-left-color: var(--muted-state);
    }
    .graph-node-head {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      justify-content: space-between;
    }
    .graph-node-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
    }
    .graph-node-facts {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    }
    .graph-node-fact {
      display: grid;
      gap: 2px;
      color: var(--text-2);
      font-size: 12px;
    }
    .graph-node-fact-label {
      color: var(--text-3);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .graph-headline {
      margin: 0 0 16px 0;
      color: var(--text-2);
    }
    .snapshot-summary {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }
    .snapshot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    .snapshot-agent {
      display: grid;
      gap: 10px;
      border: 1.5px solid var(--border-hard);
      padding: 12px;
      background: var(--surface);
    }
    .snapshot-agent-head {
      display: grid;
      gap: 4px;
    }
    .snapshot-agent-name {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
    }
    .capability-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .team-summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .team-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .team-card {
      display: grid;
      gap: 12px;
    }
    .team-agent-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .team-agent-name {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      text-transform: lowercase;
    }
    @media (max-width: 1179px) {
      .team-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 767px) {
      header {
        padding: 8px 16px;
      }
      main {
        padding: 24px 16px 40px;
      }
      .grid-two,
      .team-summary-grid,
      .team-grid {
        grid-template-columns: 1fr;
      }
      .desktop-table {
        display: none;
      }
      .directory-card-list {
        display: grid;
      }
      .nav-spacer {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <span class="nav-brand">gistclaw</span>
      <a href="/runs">Runs</a>
      <a href="/team">Team</a>
      <a href="/control">Control</a>
      <a href="/sessions">Sessions</a>
      <a href="/approvals">Approvals</a>
      <a href="/settings">Settings</a>
      <span class="nav-spacer"></span>
      <div class="theme-switcher" role="group" aria-label="Color theme">
        <button class="theme-toggle" type="button" data-theme-option="system">System</button>
        <button class="theme-toggle" type="button" data-theme-option="light">Light</button>
        <button class="theme-toggle" type="button" data-theme-option="dark">Dark</button>
      </div>
    </nav>
  </header>
  <main>
    {{.Body}}
  </main>
  <script>
    (() => {
      const path = window.location.pathname;
      for (const link of document.querySelectorAll("nav a[href]")) {
        const href = link.getAttribute("href");
        if (!href) {
          continue;
        }
        if (path === href || path.startsWith(href + "/")) {
          link.classList.add("is-active");
        }
      }

      const storageKey = "gistclaw.theme";
      const root = document.documentElement;
      const buttons = document.querySelectorAll("[data-theme-option]");

      function currentTheme() {
        return root.dataset.theme || "system";
      }

      function syncThemeButtons() {
        const active = currentTheme();
        for (const button of buttons) {
          button.classList.toggle("is-active", button.dataset.themeOption === active);
        }
      }

      function applyTheme(theme) {
        if (theme === "light" || theme === "dark") {
          root.dataset.theme = theme;
        } else {
          delete root.dataset.theme;
        }
        syncThemeButtons();
      }

      for (const button of buttons) {
        button.addEventListener("click", () => {
          const theme = button.dataset.themeOption || "system";
          try {
            if (theme === "system") {
              window.localStorage.removeItem(storageKey);
            } else {
              window.localStorage.setItem(storageKey, theme);
            }
          } catch (_err) {
          }
          applyTheme(theme);
        });
      }

      syncThemeButtons();
    })();
  </script>
</body>
</html>
{{end}}
