{{define "layout"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    (() => {
      try {
        const savedTheme = window.localStorage.getItem("gistclaw.theme");
        if (savedTheme === "light" || savedTheme === "dark") {
          document.documentElement.dataset.theme = savedTheme;
        }
      } catch (_err) {
      }
    })();
  </script>
  <style>
    :root {
      --bg: #ede5d8;
      --surface: #fffdf8;
      --border-hard: #1c1917;
      --border-soft: #cfc5b6;
      --text-1: #1c1917;
      --text-2: #6b6258;
      --text-3: #9b9083;
      --brand: #1c5dff;
      --brand-hover: #1848c7;
      --pending: #1c5dff;
      --active: #0284c7;
      --approval: #b45309;
      --success: #15803d;
      --error: #dc2626;
      --muted-state: #6b7280;
      --font-mono: "JetBrains Mono", "Fira Code", monospace;
      --control-height: 44px;
      --shell-control-height: 36px;
    }
    :root[data-theme="dark"] {
      --bg: #12100e;
      --surface: #1b1815;
      --border-hard: #f5f0e8;
      --border-soft: #4a433c;
      --text-1: #f5f0e8;
      --text-2: #b6aa9a;
      --text-3: #8f8477;
      --brand: #6ea0ff;
      --brand-hover: #8bb4ff;
      --pending: #6ea0ff;
      --active: #38bdf8;
      --approval: #f59e0b;
      --success: #4ade80;
      --error: #f87171;
      --muted-state: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --bg: #12100e;
        --surface: #1b1815;
        --border-hard: #f5f0e8;
        --border-soft: #4a433c;
        --text-1: #f5f0e8;
        --text-2: #b6aa9a;
        --text-3: #8f8477;
        --brand: #6ea0ff;
        --brand-hover: #8bb4ff;
        --pending: #6ea0ff;
        --active: #38bdf8;
        --approval: #f59e0b;
        --success: #4ade80;
        --error: #f87171;
        --muted-state: #9ca3af;
      }
    }
    * {
      box-sizing: border-box;
    }
    html {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--text-1);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    .shell-header {
      display: flex;
      align-items: center;
      min-height: 62px;
      border-bottom: 2px solid var(--border-hard);
      background: var(--bg);
      padding: 10px 24px;
    }
    .shell-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 24px;
      align-items: center;
      width: 100%;
    }
    .shell-brand-lockup {
      display: grid;
      gap: 4px;
      align-content: center;
      margin-right: 4px;
    }
    .shell-brand {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      background: var(--border-hard);
      color: var(--surface);
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
    }
    .shell-brand-note {
      color: var(--text-3);
      font: 700 10px/1.2 var(--font-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .shell-nav-cluster {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      align-items: center;
    }
    .shell-nav-group {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 0 3px;
      border-bottom: 2px solid transparent;
      color: var(--text-2);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
    }
    .shell-subnav-link {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 0 4px;
      border-bottom: 2px solid transparent;
      color: var(--text-2);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
    }
    .shell-nav-group:hover,
    .shell-nav-group.is-active,
    .shell-subnav-link:hover,
    .shell-subnav-link.is-active {
      color: var(--text-1);
      border-bottom-color: var(--border-hard);
      text-decoration: none;
    }
    .shell-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-left: auto;
    }
    .shell-project-switcher {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      align-items: stretch;
    }
    .shell-project-select {
      min-width: 180px;
      width: auto;
    }
    .shell-project-select.shell-toolbar-control {
      min-height: var(--shell-control-height);
      height: var(--shell-control-height);
      padding: 0 10px;
      font-size: 12px;
      line-height: 1.2;
    }
    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 40px 24px 56px;
    }
    .shell-subnav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      align-items: center;
      margin: 0 0 30px 0;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-soft);
    }
    a {
      color: var(--brand);
    }
    a:hover {
      color: var(--brand-hover);
    }
    a:focus-visible,
    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 2px solid var(--brand);
      outline-offset: 2px;
    }
    h1,
    h2,
    h3,
    p,
    ul {
      margin-top: 0;
    }
    h1 {
      margin-bottom: 8px;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 700;
    }
    h2 {
      margin-bottom: 12px;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 700;
    }
    label {
      display: grid;
      gap: 4px;
      font-size: 13px;
      font-weight: 700;
    }
    code {
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .panel {
      border: 1.5px solid var(--border-hard);
      background: var(--surface);
      padding: 22px 24px;
      margin-bottom: 18px;
      border-radius: 0;
    }
    .page-header {
      display: grid;
      gap: 10px;
      margin: 0 0 28px 0;
    }
    .page-stack {
      display: grid;
      gap: 16px;
    }
    .page-section {
      margin-bottom: 24px;
    }
    fieldset {
      margin: 0;
      padding: 0;
      border: none;
      min-width: 0;
    }
    legend {
      padding: 0;
    }
    .page-eyebrow {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 3px 8px;
      background: var(--border-hard);
      color: var(--surface);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .page-lede {
      max-width: 760px;
      margin-bottom: 0;
      color: var(--text-2);
    }
    .run-meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      align-items: stretch;
    }
    .run-meta-card {
      display: grid;
      gap: 6px;
      border: 1.5px solid var(--border-hard);
      border-left: 4px solid var(--border-hard);
      padding: 12px 14px;
      background: var(--surface);
    }
    .run-meta-label {
      color: var(--text-3);
      font: 700 10px/1.2 var(--font-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .run-meta-value {
      color: var(--text-1);
      font-size: 14px;
      font-weight: 700;
      word-break: break-word;
    }
    .panel-kicker {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      color: var(--text-3);
      font: 700 10px/1.2 var(--font-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .panel-note {
      margin: 0;
      max-width: 64ch;
      color: var(--text-2);
    }
    .panel:last-child {
      margin-bottom: 0;
    }
    .stack-sm > * + * {
      margin-top: 8px;
    }
    .stack-md > * + * {
      margin-top: 12px;
    }
    .stack-lg > * + * {
      margin-top: 16px;
    }
    .field {
      display: grid;
      gap: 4px;
      margin-bottom: 12px;
    }
    .field:last-child {
      margin-bottom: 0;
    }
    .field-label {
      font-size: 13px;
      font-weight: 700;
    }
    .field-label-ghost {
      visibility: hidden;
      user-select: none;
    }
    .field-help {
      font-size: 13px;
      color: var(--text-2);
    }
    .input-wide {
      width: 100%;
    }
    .mono {
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
    }
    .mono-strong {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.6;
    }
    .muted {
      color: var(--text-2);
    }
    .subtle {
      color: var(--text-3);
    }
    .run-row {
      border: 1.5px solid var(--border-hard);
      border-left: 4px solid var(--border-hard);
      padding: 14px 16px;
      margin-top: 0;
      background: var(--surface);
      border-radius: 0;
    }
    .run-row.is-active {
      border-left-color: var(--active);
    }
    .run-row.is-pending {
      border-left-color: var(--pending);
    }
    .run-row.is-approval {
      border-left-color: var(--approval);
    }
    .run-row.is-success {
      border-left-color: var(--success);
    }
    .run-row.is-error {
      border-left-color: var(--error);
    }
    .run-row.is-muted {
      border-left-color: var(--muted-state);
    }
    .run-link {
      display: block;
      color: inherit;
      text-decoration: none;
    }
    .run-link:hover {
      color: inherit;
    }
    .run-link:hover .row-title,
    .run-link:focus-visible .row-title {
      text-decoration: underline;
      text-decoration-thickness: 1.5px;
      text-underline-offset: 4px;
    }
    .row-title {
      font-size: 15px;
      font-weight: 700;
    }
    .run-cluster {
      border: 1.5px solid var(--border-hard);
      background: var(--surface);
    }
    .run-cluster[open] {
      border-left: 4px solid var(--border-hard);
    }
    .run-cluster-summary {
      display: grid;
      grid-template-columns: 92px minmax(0, 1.4fr) repeat(5, minmax(0, 1fr));
      gap: 12px;
      align-items: start;
      padding: 14px 16px;
      cursor: pointer;
      list-style: none;
    }
    .run-cluster-summary::-webkit-details-marker {
      display: none;
    }
    .run-cluster-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      border: 1.5px solid var(--border-hard);
      padding: 6px 8px;
      color: var(--text-2);
      font: 700 11px/1.2 var(--font-mono);
      text-transform: uppercase;
    }
    .run-cluster[open] .run-cluster-toggle {
      background: var(--border-hard);
      color: var(--surface);
    }
    .run-cluster-primary,
    .run-child-primary {
      display: grid;
      gap: 6px;
      min-width: 0;
    }
    .run-cluster-heading,
    .run-child-heading {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
      align-items: baseline;
      justify-content: space-between;
    }
    .run-cluster-title,
    .run-child-title {
      color: var(--text-1);
      font-size: 15px;
      font-weight: 700;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
      text-decoration: none;
    }
    .run-cluster-title {
      -webkit-line-clamp: 2;
    }
    .run-child-title {
      font-size: 14px;
      -webkit-line-clamp: 2;
    }
    .run-cluster-title:hover,
    .run-cluster-title:focus-visible,
    .run-child-title:hover,
    .run-child-title:focus-visible {
      color: var(--text-1);
      text-decoration: underline;
      text-decoration-thickness: 1.5px;
      text-underline-offset: 4px;
    }
    .run-cluster-identifiers {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      min-width: 0;
    }
    .run-cluster-meta {
      display: grid;
      gap: 2px;
      min-width: 0;
    }
    .run-cluster-label {
      color: var(--text-3);
      font: 700 10px/1.2 var(--font-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .run-cluster-value {
      color: var(--text-1);
      font-size: 13px;
      font-weight: 700;
      word-break: break-word;
    }
    .run-cluster-meta time,
    .run-cluster-meta .subtle {
      display: block;
    }
    .run-cluster-children {
      display: grid;
      gap: 8px;
      padding: 0 16px 16px 112px;
      border-top: 1px solid var(--border-soft);
      background: color-mix(in srgb, var(--surface) 92%, var(--bg) 8%);
    }
    .run-child-row {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) repeat(4, minmax(0, 1fr));
      gap: 12px;
      align-items: start;
      padding: 12px 0;
      border-top: 1px solid var(--border-soft);
      border-left: 3px solid var(--border-hard);
      padding-left: 12px;
    }
    .run-cluster-children > .run-child-row:first-child {
      border-top: none;
    }
    .run-child-row.is-active {
      border-left-color: var(--active);
    }
    .run-child-row.is-pending {
      border-left-color: var(--pending);
    }
    .run-child-row.is-approval {
      border-left-color: var(--approval);
    }
    .run-child-row.is-success {
      border-left-color: var(--success);
    }
    .run-child-row.is-error {
      border-left-color: var(--error);
    }
    .run-child-row.is-muted {
      border-left-color: var(--muted-state);
    }
    .run-timeline-card {
      display: grid;
      gap: 10px;
    }
    .run-timeline-head {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: baseline;
      justify-content: space-between;
    }
    .run-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      border: 1.5px solid currentColor;
      padding: 2px 6px;
      background: var(--surface);
      color: var(--text-2);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .run-status::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex: none;
    }
    .run-status.is-active {
      color: var(--active);
    }
    .run-status.is-pending {
      color: var(--pending);
    }
    .run-status.is-approval {
      color: var(--approval);
    }
    .run-status.is-success {
      color: var(--success);
    }
    .run-status.is-error {
      color: var(--error);
    }
    .run-status.is-muted {
      color: var(--muted-state);
    }
    .run-output-text {
      margin: 8px 0 0 0;
      white-space: pre-wrap;
      word-break: break-word;
      font: 13px/1.6 var(--font-mono);
    }
    .structured-text {
      display: grid;
      gap: 12px;
      color: var(--text-1);
    }
    .structured-text p {
      margin: 0;
      color: var(--text-1);
    }
    .structured-list {
      margin: 0;
      padding-left: 20px;
      display: grid;
      gap: 6px;
    }
    .structured-preview {
      white-space: pre-line;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      overflow: hidden;
      word-break: break-word;
    }
    .error {
      border: 1.5px solid var(--error);
      color: var(--error);
      padding: 12px;
      margin-bottom: 16px;
      background: var(--surface);
      border-radius: 0;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid currentColor;
      padding: 2px 6px;
      background: transparent;
      color: currentColor;
      border-radius: 0;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .badge-approval {
      color: var(--approval);
    }
    .badge-success {
      color: var(--success);
    }
    .badge-error {
      color: var(--error);
    }
    .badge-muted {
      color: var(--text-2);
    }
    .grid-two {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
    }
    .desktop-table {
      display: block;
    }
    .directory-card-list {
      display: none;
      gap: 12px;
    }
    .directory-card {
      display: grid;
      gap: 12px;
      border: 1.5px solid var(--border-hard);
      border-left: 4px solid var(--border-hard);
      padding: 14px 16px;
      background: var(--surface);
    }
    .directory-card-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    }
    .directory-card-section {
      display: grid;
      gap: 3px;
    }
    .directory-card-label {
      color: var(--text-3);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .directory-card-actions {
      display: grid;
      gap: 8px;
    }
    .filter-panel {
      display: grid;
      gap: 14px;
    }
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr)) auto;
      gap: 12px;
      align-items: end;
    }
    .session-filter-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
    }
    .session-filter-footer {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 16px;
      align-items: flex-start;
    }
    .filter-action-group.session-filter-actions {
      gap: 0;
    }
    .filter-grid .field,
    .approval-filter-grid .field,
    .inline-form .field {
      margin-bottom: 0;
    }
    .filter-search {
      grid-column: 1 / -1;
    }
    .filter-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .filter-action-group {
      display: grid;
      gap: 4px;
      align-self: end;
      justify-self: start;
    }
    .table th,
    .table td {
      border-top: 1px solid var(--border-soft);
      padding: 8px;
      vertical-align: top;
      text-align: left;
    }
    .table th {
      border-top: none;
      border-bottom: 1.5px solid var(--border-hard);
      font-size: 13px;
      font-weight: 700;
    }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .inline-form {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .inline-form input[type="text"],
    .inline-form input[type="password"],
    .inline-form select {
      min-width: 220px;
    }
    .approval-filter-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 1fr)) auto;
      gap: 12px;
      align-items: end;
    }
    .approval-filter-search {
      grid-column: 1 / -1;
    }
    .approval-filter-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .approval-card {
      display: grid;
      gap: 8px;
    }
    .approval-card-meta {
      gap: 10px;
    }
    .approval-card-actions {
      margin-top: 4px;
      gap: 10px;
    }
    .filter-cluster {
      display: grid;
      gap: 4px;
      align-self: stretch;
      margin: 0;
      padding: 0;
      border: 0;
      min-inline-size: 0;
    }
    .filter-legend {
      color: var(--text-2);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .segmented-control {
      display: inline-flex;
      align-items: stretch;
      height: var(--control-height);
      border: 1.5px solid var(--border-hard);
      background: var(--surface);
    }
    .segmented-option {
      display: flex;
      align-items: stretch;
      gap: 0;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .segmented-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .segmented-option span {
      display: inline-flex;
      align-items: center;
      height: 100%;
      min-height: 0;
      padding: 0 12px;
      border-right: 1.5px solid var(--border-hard);
      background: var(--surface);
      color: var(--text-2);
    }
    .segmented-option:last-child span {
      border-right: none;
    }
    .segmented-option input:checked + span {
      background: var(--border-hard);
      color: var(--surface);
    }
    input[type="text"],
    input[type="password"],
    input[type="number"],
    select {
      border: 1.5px solid var(--border-hard);
      background: var(--surface);
      color: var(--text-1);
      height: var(--control-height);
      padding: 0 12px;
      font: inherit;
      line-height: 1.2;
      border-radius: 0;
      width: 100%;
    }
    textarea {
      border: 1.5px solid var(--border-hard);
      background: var(--surface);
      color: var(--text-1);
      padding: 8px 12px;
      font: inherit;
      line-height: 1.5;
      border-radius: 0;
      width: 100%;
    }
    input[type="radio"],
    input[type="checkbox"] {
      width: auto;
      margin: 0;
      accent-color: var(--brand);
    }
    .input-file {
      width: 100%;
      min-width: 0;
      border: 1.5px solid var(--border-hard);
      background: var(--surface);
      color: var(--text-2);
      padding: 6px;
      font: inherit;
      border-radius: 0;
    }
    .input-file::file-selector-button {
      margin-right: 12px;
      border: 1.5px solid var(--border-hard);
      background: var(--surface);
      color: var(--text-1);
      padding: 7px 10px;
      font: 700 12px/1.2 var(--font-mono);
      cursor: pointer;
      border-radius: 0;
    }
    .input-file:hover::file-selector-button {
      background: var(--border-hard);
      color: var(--surface);
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1.5px solid transparent;
      min-height: var(--control-height);
      padding: 0 14px;
      background: transparent;
      color: var(--text-1);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
      text-decoration: none;
      cursor: pointer;
      border-radius: 0;
      transition: background 100ms ease-out, color 100ms ease-out, border-color 100ms ease-out;
    }
    button {
      font: inherit;
    }
    .btn-primary {
      background: var(--brand);
      border-color: var(--brand);
      color: var(--surface);
    }
    .btn-primary:hover {
      background: var(--brand-hover);
      border-color: var(--brand-hover);
      color: var(--surface);
    }
    .btn-secondary {
      background: var(--surface);
      border-color: var(--border-hard);
      color: var(--text-1);
    }
    .btn-secondary:hover {
      background: var(--border-hard);
      color: var(--surface);
    }
    .btn-subtle {
      border-color: var(--border-soft);
      background: transparent;
      color: var(--text-2);
    }
    .btn-subtle:hover {
      border-color: var(--border-hard);
      background: var(--surface);
      color: var(--text-1);
    }
    .btn-ghost {
      border-color: transparent;
      padding-left: 0;
      padding-right: 0;
      color: var(--text-2);
    }
    .btn-ghost:hover {
      color: var(--text-1);
    }
    .btn-danger {
      background: var(--surface);
      border-color: var(--error);
      color: var(--error);
    }
    .btn-danger:hover {
      background: var(--error);
      color: var(--surface);
    }
    .btn-compact {
      min-height: 28px;
      padding: 0 8px;
      font-size: 11px;
    }
    .btn-inline {
      min-height: 28px;
      padding: 0 10px;
      font-size: 11px;
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .choice-list {
      display: grid;
      gap: 8px;
    }
    .choice-card {
      display: grid;
      gap: 4px;
      border: 1.5px solid var(--border-hard);
      border-left: 4px solid var(--active);
      padding: 12px;
      cursor: pointer;
      background: var(--surface);
      border-radius: 0;
    }
    .choice-card-meta {
      display: block;
    }
    .metric-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      align-items: stretch;
    }
    .metric-card {
      display: grid;
      gap: 4px;
      border: 1.5px solid var(--border-hard);
      border-left: 4px solid var(--border-hard);
      padding: 12px 14px;
      background: var(--surface);
      min-height: 100%;
    }
    .metric-card.is-active {
      border-left-color: var(--active);
    }
    .metric-card.is-approval {
      border-left-color: var(--approval);
    }
    .metric-card.is-success {
      border-left-color: var(--success);
    }
    .metric-card.is-error {
      border-left-color: var(--error);
    }
    .metric-card.is-muted {
      border-left-color: var(--muted-state);
    }
    .metric-label {
      color: var(--text-3);
      font: 700 10px/1.2 var(--font-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .metric-value {
      color: var(--text-1);
      font: 700 22px/1 var(--font-mono);
    }
    .empty-state {
      display: grid;
      gap: 16px;
      align-content: start;
      min-height: 220px;
    }
    .empty-state.is-compact {
      min-height: auto;
      padding: 0;
      border: none;
      background: transparent;
    }
    .empty-state-copy {
      max-width: 64ch;
      margin: 0;
      color: var(--text-2);
    }
    .empty-state-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      align-items: stretch;
    }
    .empty-state-fact {
      display: grid;
      gap: 6px;
      padding-top: 12px;
      border-top: 1px solid var(--border-soft);
      min-height: 100%;
    }
    .empty-state-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .theme-switcher {
      display: inline-flex;
      align-items: center;
      border: 1.5px solid var(--border-hard);
      background: var(--surface);
    }
    .theme-toggle {
      border: none;
      border-right: 1.5px solid var(--border-hard);
      padding: 7px 10px;
      background: var(--surface);
      color: var(--text-2);
      font: 700 11px/1.2 var(--font-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .theme-toggle:last-child {
      border-right: none;
    }
    .theme-toggle.is-active {
      background: var(--border-hard);
      color: var(--surface);
    }
    .divider {
      border: none;
      border-top: 1.5px solid var(--border-soft);
      margin: 16px 0;
    }
    .section-title {
      margin: 0 0 12px 0;
      font-size: 16px;
      font-weight: 700;
    }
    .pager {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 12px;
    }
    .status-banner {
      border: 1.5px solid var(--border-hard);
      border-left: 4px solid var(--border-hard);
      padding: 12px 14px;
      background: var(--surface);
    }
    .status-banner.is-pending {
      border-left-color: var(--pending);
    }
    .status-banner.is-active {
      border-left-color: var(--active);
    }
    .status-banner.is-approval {
      border-left-color: var(--approval);
    }
    .status-banner.is-success {
      border-left-color: var(--success);
    }
    .status-banner.is-error {
      border-left-color: var(--error);
    }
    .status-banner.is-muted {
      border-left-color: var(--muted-state);
    }
    .notice-panel {
      border-left: 4px solid var(--brand);
      font-weight: 600;
    }
    .queue-strip {
      display: grid;
      gap: 18px;
    }
    .queue-strip-head {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }
    .queue-stage-board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      align-items: stretch;
    }
    .queue-stage-card {
      display: grid;
      gap: 8px;
      border: 1.5px solid var(--border-hard);
      border-left: 4px solid var(--border-hard);
      padding: 16px;
      background: var(--surface);
      min-height: 100%;
    }
    .queue-stage-card.is-approval {
      border-left-color: var(--approval);
    }
    .queue-stage-value {
      color: var(--text-1);
      font: 700 24px/1 var(--font-mono);
    }
    .graph-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }
    .graph-stage {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(280px, 0.85fr);
      gap: 16px;
      align-items: start;
    }
    .graph-stage-panel {
      display: grid;
      gap: 12px;
    }
    .graph-diagram {
      height: clamp(280px, 36vh, 420px);
      border: 1.5px solid var(--border-hard);
      background: var(--surface);
    }
    .graph-metric {
      display: grid;
      gap: 2px;
      border: 1.5px solid var(--border-hard);
      border-left: 4px solid var(--border-hard);
      padding: 10px 12px;
      background: var(--surface);
    }
    .graph-metric.is-pending {
      border-left-color: var(--pending);
    }
    .graph-metric.is-active {
      border-left-color: var(--active);
    }
    .graph-metric.is-approval {
      border-left-color: var(--approval);
    }
    .graph-metric.is-success {
      border-left-color: var(--success);
    }
    .graph-metric.is-error {
      border-left-color: var(--error);
    }
    .graph-metric.is-muted {
      border-left-color: var(--muted-state);
    }
    .graph-metric-value {
      font: 700 20px/1.1 var(--font-mono);
      color: var(--text-1);
    }
    .graph-metric.is-pending .graph-metric-value {
      color: var(--pending);
    }
    .graph-metric.is-active .graph-metric-value {
      color: var(--active);
    }
    .graph-metric.is-approval .graph-metric-value {
      color: var(--approval);
    }
    .graph-metric.is-success .graph-metric-value {
      color: var(--success);
    }
    .graph-metric.is-error .graph-metric-value {
      color: var(--error);
    }
    .graph-metric.is-muted .graph-metric-value {
      color: var(--muted-state);
    }
    .graph-board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
      align-items: start;
    }
    .graph-column {
      display: grid;
      gap: 10px;
    }
    .graph-column-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border-soft);
    }
    .graph-column-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .graph-node-stack {
      display: grid;
      gap: 10px;
    }
    .graph-node {
      display: grid;
      gap: 6px;
      border: 1.5px solid var(--border-hard);
      border-left: 4px solid var(--border-hard);
      padding: 12px;
      background: var(--surface);
      cursor: pointer;
    }
    .graph-node.is-pending {
      border-left-color: var(--pending);
    }
    .graph-node.is-active {
      border-left-color: var(--active);
    }
    .graph-node.is-approval {
      border-left-color: var(--approval);
    }
    .graph-node.is-success {
      border-left-color: var(--success);
    }
    .graph-node.is-error {
      border-left-color: var(--error);
    }
    .graph-node.is-muted {
      border-left-color: var(--muted-state);
    }
    .graph-node-head {
      display: flex;
      gap: 10px;
      align-items: start;
      justify-content: space-between;
    }
    .graph-node-title-row {
      display: grid;
      gap: 2px;
    }
    .graph-node-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
    }
    .graph-node-time {
      display: grid;
      gap: 2px;
      justify-items: end;
      text-align: right;
      color: var(--text-2);
      font-size: 12px;
    }
    .graph-node-objective {
      color: var(--text-1);
      font-size: 13px;
      line-height: 1.5;
    }
    .graph-node-facts {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    }
    .graph-node-fact {
      display: grid;
      gap: 2px;
      color: var(--text-2);
      font-size: 12px;
    }
    .graph-node-fact-label {
      color: var(--text-3);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .run-node-modal {
      width: min(920px, calc(100vw - 40px));
      max-height: calc(100vh - 48px);
      padding: 0;
      border: 1.5px solid var(--border-hard);
      background: var(--surface);
      color: var(--text-1);
    }
    .run-node-modal::backdrop {
      background: color-mix(in srgb, var(--border-hard) 28%, transparent);
    }
    .run-node-modal-frame {
      display: grid;
      gap: 16px;
      padding: 22px 24px;
    }
    .run-node-modal-head {
      display: flex;
      gap: 16px;
      align-items: start;
      justify-content: space-between;
    }
    .run-node-modal-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-soft);
    }
    .run-node-modal-tabs .is-active {
      border-color: var(--border-hard);
      color: var(--text-1);
      background: var(--surface);
    }
    .run-node-modal-panel {
      display: grid;
      gap: 12px;
      min-height: 180px;
      overflow: auto;
      padding-right: 4px;
    }
    .graph-headline {
      margin: 0 0 16px 0;
      color: var(--text-2);
    }
    .snapshot-summary {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }
    .snapshot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    .snapshot-agent {
      display: grid;
      gap: 10px;
      border: 1.5px solid var(--border-hard);
      padding: 12px;
      background: var(--surface);
    }
    .snapshot-agent-head {
      display: grid;
      gap: 4px;
    }
    .snapshot-agent-name {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
    }
    .capability-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .team-summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      align-items: start;
    }
    .team-summary-head {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-soft);
    }
    .team-summary-intro {
      display: grid;
      gap: 6px;
      align-content: start;
    }
    .team-summary-intro p {
      margin-bottom: 0;
    }
    .team-file-tools {
      display: grid;
      gap: 10px;
      justify-items: start;
      align-content: start;
    }
    .team-utility-bar {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.3fr);
      gap: 16px;
      align-items: end;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border-soft);
    }
    .team-utility-copy {
      display: grid;
      gap: 6px;
      align-content: start;
    }
    .team-utility-copy p {
      margin-bottom: 0;
    }
    .team-import-controls {
      display: grid;
      gap: 6px;
      width: 100%;
    }
    .team-import-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      width: 100%;
    }
    .team-import-row .btn {
      min-height: 100%;
    }
    .team-primary-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
    }
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      align-items: stretch;
      grid-auto-rows: 1fr;
    }
    .team-summary,
    .team-card {
      margin-bottom: 0;
    }
    .team-card {
      display: grid;
      gap: 16px;
      height: 100%;
      align-content: start;
      grid-template-rows: auto auto 1fr;
      border-left: 4px solid var(--border-hard);
    }
    .team-card.is-front {
      border-left-color: var(--brand);
    }
    .team-card.is-specialist {
      border-left-color: var(--border-hard);
    }
    .team-agent-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .team-card-meta {
      display: grid;
      gap: 4px;
      padding-top: 8px;
      border-top: 1px solid var(--border-soft);
    }
    .team-agent-name {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
    }
    .team-card .field,
    .team-summary .field {
      margin-bottom: 0;
    }
    .team-card-fields {
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .team-card-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }
    .team-link-group {
      align-content: start;
    }
    .choice-chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-start;
    }
    .choice-chip {
      position: relative;
      display: inline-flex;
      cursor: pointer;
    }
    .choice-chip input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .choice-chip span {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 7px 10px;
      border: 1.5px solid var(--border-hard);
      background: var(--surface);
      color: var(--text-2);
      font: 700 12px/1.2 var(--font-mono);
      text-transform: lowercase;
    }
    .choice-chip input:checked + span {
      background: var(--brand);
      border-color: var(--brand);
      color: var(--surface);
    }
    .team-form-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    @media (max-width: 1179px) {
      .team-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (min-width: 960px) {
      .metric-strip {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .queue-stage-board {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .empty-state-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
    @media (max-width: 767px) {
      .shell-header {
        padding: 8px 16px;
      }
      main {
        padding: 24px 16px 40px;
      }
      .grid-two,
                  .filter-grid,
                  .session-filter-grid,
                  .run-cluster-summary,
                  .run-child-row,
                  .queue-strip-head,
                  .team-summary-head,
                  .team-summary-grid,
      .team-grid,
      .approval-filter-grid,
      .team-utility-bar,
      .team-import-row,
      .graph-stage {
        grid-template-columns: 1fr;
      }
      .approval-filter-search {
        grid-column: auto;
      }
      .team-primary-actions {
        justify-content: flex-start;
      }
      .desktop-table {
        display: none;
      }
      .directory-card-list {
        display: grid;
      }
      .shell-toolbar {
        margin-left: 0;
        width: 100%;
        justify-content: space-between;
      }
                  .shell-project-switcher {
                    width: 100%;
                  }
                  .shell-project-select {
                    flex: 1 1 220px;
                  }
                  .run-cluster-children {
                    padding: 0 16px 16px;
                  }
                }
              </style>
</head>
<body>
  <header class="shell-header">
    <nav class="shell-nav" aria-label="Primary">
      <div class="shell-brand-lockup">
        <span class="shell-brand">gistclaw</span>
        <span class="shell-brand-note">local operator runtime</span>
      </div>
      <div class="shell-nav-cluster">
      {{range .Navigation.Groups}}
      <a class="shell-nav-group{{if .Active}} is-active{{end}}" href="{{.Href}}">{{.Label}}</a>
      {{end}}
      </div>
      <div class="shell-toolbar">
      {{if .Project.Options}}
      <form class="shell-project-switcher" method="POST" action="/projects/activate">
        <input type="hidden" name="redirect_to" value="{{.CurrentPath}}">
        <select class="shell-project-select shell-toolbar-control" name="project_id" aria-label="Active project" onchange="this.form.requestSubmit()">
          {{range .Project.Options}}
          <option value="{{.ID}}" {{if .Active}}selected{{end}}>{{.Name}}</option>
          {{end}}
        </select>
      </form>
      {{end}}
      <div class="theme-switcher" role="group" aria-label="Color theme">
        <button class="theme-toggle" type="button" data-theme-option="system">System</button>
        <button class="theme-toggle" type="button" data-theme-option="light">Light</button>
        <button class="theme-toggle" type="button" data-theme-option="dark">Dark</button>
      </div>
      </div>
    </nav>
  </header>
  <main>
    {{if .Navigation.Children}}
    <nav class="shell-subnav" aria-label="Section">
      {{range .Navigation.Children}}
      <a class="shell-subnav-link{{if .Active}} is-active{{end}}" href="{{.Href}}">{{.Label}}</a>
      {{end}}
    </nav>
    {{end}}
    {{.Body}}
  </main>
  <script>
    (() => {
      const storageKey = "gistclaw.theme";
      const root = document.documentElement;
      const buttons = document.querySelectorAll("[data-theme-option]");

      function currentTheme() {
        return root.dataset.theme || "system";
      }

      function syncThemeButtons() {
        const active = currentTheme();
        for (const button of buttons) {
          button.classList.toggle("is-active", button.dataset.themeOption === active);
        }
      }

      function applyTheme(theme) {
        if (theme === "light" || theme === "dark") {
          root.dataset.theme = theme;
        } else {
          delete root.dataset.theme;
        }
        syncThemeButtons();
      }

      for (const button of buttons) {
        button.addEventListener("click", () => {
          const theme = button.dataset.themeOption || "system";
          try {
            if (theme === "system") {
              window.localStorage.removeItem(storageKey);
            } else {
              window.localStorage.setItem(storageKey, theme);
            }
          } catch (_err) {
          }
          applyTheme(theme);
        });
      }

      function confirmMessage(form, submitter) {
        if (submitter && submitter.dataset && submitter.dataset.confirm) {
          return submitter.dataset.confirm;
        }
        if (form && form.dataset && form.dataset.confirm) {
          return form.dataset.confirm;
        }
        return "";
      }

      window.gistclawConfirmSubmission = (form, submitter) => {
        const message = confirmMessage(form, submitter);
        if (!message) {
          return true;
        }
        return window.confirm(message);
      };

      document.addEventListener("submit", (event) => {
        const form = event.target;
        if (!(form instanceof HTMLFormElement)) {
          return;
        }
        if (!window.gistclawConfirmSubmission(form, event.submitter)) {
          event.preventDefault();
        }
      });

      syncThemeButtons();
    })();
  </script>
</body>
</html>
{{end}}
