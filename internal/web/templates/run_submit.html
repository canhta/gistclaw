{{define "run_submit_body"}}
<section class="panel">
  <h1>Submit a Task</h1>
  {{if .Error}}
    <p class="error">{{.Error}}</p>
  {{end}}
  <form method="POST" action="/run">
    <div class="field">
      <label for="task">Task</label>
      <textarea id="task" name="task" rows="4" placeholder="Describe the task for the agent team...">{{.Task}}</textarea>
    </div>
    <div class="field">
      <button type="submit">Start Run</button>
    </div>
  </form>
</section>
{{end}}
